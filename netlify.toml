# Netlify configuration

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Proxy Supabase API calls through Netlify Functions (for China access)
[[redirects]]
  from = "/rest/v1/*"
  to = "/.netlify/functions/supabase-proxy/rest/v1/:splat"
  status = 200

[[redirects]]
  from = "/auth/v1/*"
  to = "/.netlify/functions/supabase-proxy/auth/v1/:splat"
  status = 200

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
